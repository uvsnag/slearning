<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Knowledge Base</title>
    <link rel="stylesheet" href="pv.css" />
  </head>
  <body>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Topics</h2>
        <input type="text" id="searchBox" placeholder="Search questions..." autocomplete="off" />
      </div>
      <nav id="topicNav"></nav>
    </div>

    <div class="main">
      <header>
        <button class="menu-btn" id="menuBtn">&#9776;</button>
        <h1>Senior Developer Interview Prep</h1>
        <div class="stats" id="stats"></div>
      </header>

      <div class="controls">
        <select id="difficultyFilter">
          <option value="all">All Levels</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
          <option value="tricky">Tricky</option>
        </select>
        <button id="randomBtn" class="btn">Random Question</button>
        <button id="expandAllBtn" class="btn">Expand All</button>
        <button id="collapseAllBtn" class="btn">Collapse All</button>
        <button id="darkModeBtn" class="btn">🌙 Dark</button>
      </div>

      <div id="content"></div>
    </div>

    <!-- Data files (each pushes topics into window.__pvTopics) -->
    <script src="pv-data-java.js"></script>
    <script src="pv-data-javascript.js"></script>
    <script src="pv-data-react.js"></script>
    <script src="pv-data-cicd-docker.js"></script>
    <script src="pv-data-sql.js"></script>
    <script src="pv-data-spring.js"></script>
    <script src="pv-data-html-css.js"></script>
    <script src="pv-data-orm.js"></script>
    <script src="pv-data-typescript.js"></script>
    <script src="pv-data-advanced.js"></script>
    <!-- App logic (reads window.__pvTopics and renders the UI) -->
    <script src="pv-app.js"></script>
  </body>
</html>
